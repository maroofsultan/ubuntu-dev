services:
  redis:
    image: redis:8
    profiles: ["redis"]
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-36379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dev-network

volumes:
  redis_data: